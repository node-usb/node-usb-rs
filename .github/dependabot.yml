version: 2

updates:
  # Maintain dependencies for Rust
  - package-ecosystem: "rust-toolchain"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain dependencies for JavaScript
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"